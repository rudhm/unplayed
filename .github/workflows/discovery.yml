name: Unplayed Discovery Engine

on:
  schedule:
    - cron: "0 */6 * * *"   # every 6 hours
  workflow_dispatch:        # manual trigger

jobs:
  run-discovery:
    runs-on: ubuntu-latest
    
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install spotipy python-dotenv

      - name: Run discovery engine
        run: python main.py
        env:
          # Map the GitHub Secrets to the environment variables your script expects
          # Note: SPOTIPY_CACHE_JSON should be the full JSON object from .cache file
          # If you get "Failed to decode SPOTIFY_CACHE_JSON", see SPOTIFY_TROUBLESHOOTING.md
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIFY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIFY_CLIENT_SECRET }}
          SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
          SPOTIFY_CACHE_JSON: ${{ secrets.SPOTIFY_CACHE_JSON }}
