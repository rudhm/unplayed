name: Weekly Music Discovery

on:
  schedule:
    # Runs at 00:00 UTC every Monday (adjust for your timezone)
    - cron: '0 0 * * 1'
  workflow_dispatch: # Adds a "Run now" button in GitHub for testing

jobs:
  run-discovery:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run Discovery Script
        run: uv run main.py
        env:
          # Last.fm Configuration (REQUIRED)
          LASTFM_API_KEY: ${{ secrets.LASTFM_API_KEY }}
          LASTFM_USERNAME: ${{ secrets.LASTFM_USERNAME }}
          
          # Make.com Webhook (PRIMARY OUTPUT - Recommended)
          MAKE_WEBHOOK_URL: ${{ secrets.MAKE_WEBHOOK_URL }}
          
          # Spotify Configuration (Required for fallback output)
          SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
          SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}
          SPOTIPY_REDIRECT_URI: ${{ secrets.SPOTIPY_REDIRECT_URI }}
          
          # Spotify Authentication for CI/CD
          SPOTIFY_CACHE_JSON: ${{ secrets.SPOTIFY_CACHE_JSON }}
          
          # Optional: Spotify Export Path (uncomment if using)
          # SPOTIFY_EXPORT_PATH: ${{ secrets.SPOTIFY_EXPORT_PATH }}
          
          # Optional: IFTTT Webhook (legacy alternative)
          # IFTTT_WEBHOOK_KEY: ${{ secrets.IFTTT_WEBHOOK_KEY }}
          
          # CI Flag (auto-detected, but explicit is better)
          CI: true
          GITHUB_ACTIONS: true

      - name: Upload output files (if any)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: discovery-output
          path: output/
          if-no-files-found: ignore
